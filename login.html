<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to FoodieHub to order delicious food from the best restaurants in Bengaluru.">
  <title>FoodieHub | Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Mobile nav drawer checkbox -->
  <input type="checkbox" id="menu-toggle" class="menu-toggle-checkbox">

  <!-- Navigation Bar -->
  <header class="navbar-wrapper">
    <div class="container navbar">
      <a href="index.html" class="logo">
        Foodie<span>Hub</span><div class="logo-dot"></div>
      </a>

      <nav class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="restaurants.html" class="nav-link">Restaurants</a>
        <a href="index.html#offers" class="nav-link">Offers</a>
        <a href="cart.html" class="nav-link nav-cart-btn">
          Cart 
          <span class="cart-badge">2</span>
        </a>
        <div class="nav-auth">
          <a href="login.html" class="btn btn-outline btn-sm active">Login</a>
          <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
      </nav>

      <!-- Mobile Hamburger Toggle Button -->
      <label for="menu-toggle" class="menu-toggle-btn">
        <svg xmlns="http://www.w3.org/2000/svg" height="28" viewBox="0 0 24 24" width="28" fill="#1C1C1C">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </label>
    </div>
  </header>

  <!-- Login Main Content -->
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Login to manage your orders and check latest offers</p>
      </div>

      <!-- Login Form -->
      <form action="index.html" method="GET" autocomplete="on">
        
        <!-- Email Input Group -->
        <div class="form-group">
          <input type="email" id="login-email" class="form-input" placeholder=" " required autocomplete="email">
          <label for="login-email" class="form-label">Email Address</label>
        </div>

        <!-- Password Input Group -->
        <div class="form-group">
          <input type="password" id="login-password" class="form-input" placeholder=" " required autocomplete="current-password">
          <label for="login-password" class="form-label">Password</label>
        </div>

        <!-- Extra Options -->
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" checked>
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 16px;">
          Log In
        </button>

        <!-- Social Login -->
        <div class="social-login-wrapper">
          <div class="social-divider">
            <span>OR LOGIN WITH</span>
          </div>
          <div class="social-buttons">
            <button type="button" class="btn-social">
              Google
            </button>
            <button type="button" class="btn-social">
              Facebook
            </button>
          </div>
        </div>

        <!-- Redirect Link -->
        <p style="text-align: center; margin-top: 32px; color: var(--text-medium); font-size: 0.95rem;">
          Don't have an account? <a href="register.html" style="color: var(--primary-color); font-weight: 600;">Sign Up</a>
        </p>

      </form>
    </div>
  </main>

  <!-- Footer Section -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2025 FoodieHub. All rights reserved.</p>
        <p>Designed with ❤️ for food lovers in Bengaluru</p>
      </div>
    </div>
  </footer>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
